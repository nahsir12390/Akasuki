<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#f97316">
    <title>Offline - Akatsuki Devs</title>
    <style>
        :root {
            color-scheme: light dark;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            background:
                radial-gradient(circle at 18% 12%, rgb(249 115 22 / 0.2), transparent 24rem),
                linear-gradient(135deg, #fff7ed, #ffffff 50%, #f8fafc);
            color: #0f172a;
        }

        main {
            width: min(92vw, 520px);
            border: 1px solid rgb(251 146 60 / 0.32);
            border-radius: 12px;
            background: rgb(255 255 255 / 0.9);
            box-shadow: 0 24px 70px rgb(15 23 42 / 0.12);
            padding: 28px;
            text-align: center;
        }

        .mark {
            display: grid;
            width: 64px;
            height: 64px;
            margin: 0 auto 18px;
            place-items: center;
            border-radius: 16px;
            background: linear-gradient(135deg, #f97316, #dc2626);
            color: white;
            font-size: 28px;
            font-weight: 900;
        }

        h1 {
            margin: 0;
            font-size: clamp(28px, 7vw, 44px);
            line-height: 1.05;
        }

        p {
            margin: 14px 0 0;
            color: #64748b;
            line-height: 1.7;
            font-weight: 600;
        }

        button {
            margin-top: 22px;
            min-height: 44px;
            border: 0;
            border-radius: 8px;
            padding: 0 18px;
            background: linear-gradient(135deg, #f97316, #dc2626);
            color: white;
            font-weight: 800;
            cursor: pointer;
        }

        @media (prefers-color-scheme: dark) {
            body {
                background:
                    radial-gradient(circle at 18% 12%, rgb(249 115 22 / 0.16), transparent 24rem),
                    linear-gradient(135deg, #020617, #0f172a 58%, #111827);
                color: white;
            }

            main {
                border-color: rgb(251 146 60 / 0.24);
                background: rgb(15 23 42 / 0.9);
            }

            p {
                color: #cbd5e1;
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="mark">AD</div>
        <h1>You are offline.</h1>
        <p>Akatsuki Devs could not reach the village right now. Reconnect to continue posts, courses, chat, quizzes, and games.</p>
        <button type="button" onclick="window.location.reload()">Try Again</button>
    </main>
</body>
</html>
